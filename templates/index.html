<!DOCTYPE html>
<html>
<head>
    <title>Hangman Pro</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f4f4f4;
            margin-top: 80px;
        }

        .box {
            background: white;
            padding: 30px;
            width: 300px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
        }

        input {
            padding: 10px;
            width: 50px;
            text-align: center;
        }

        button {
            padding: 10px;
            margin-top: 10px;
            cursor: pointer;
        }

        .word {
            font-size: 30px;
            letter-spacing: 5px;
        }

        .lives {
            color: red;
            font-size: 18px;
        }
    </style>
</head>

<body>

<div class="box">
    <h1>🎮 Hangman Game</h1>

    <p class="word">{{ word }}</p>
    <p class="lives">Lives: {{ lives }}</p>

    <form method="POST">
        <input name="letter" maxlength="1" required>
        <br>
        <button type="submit">Guess</button>
    </form>
</div>

</body>
</html>
