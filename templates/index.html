<!DOCTYPE html>
<html>
<head>
    <title>Hangman Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container text-center mt-5">

    <h1 class="mb-4">🎮 Hangman Pro</h1>

    <h2 class="mb-3">{{ word }}</h2>

    <h4>Lives: <span class="text-danger">{{ lives }}</span></h4>

    {% if history %}
    <p>Guessed: {{ history }}</p>
    {% endif %}

    {% if won %}
        <div class="alert alert-success">🎉 You Won!</div>
    {% endif %}

    {% if lost %}
        <div class="alert alert-danger">😢 You Lost!</div>
    {% endif %}

    <form method="POST" class="mt-3">
        <input name="letter" maxlength="1" class="form-control w-25 mx-auto mb-2" required>
        <button class="btn btn-primary">Guess</button>
    </form>

    <form method="POST" class="mt-3">
        <select name="category" class="form-select w-25 mx-auto mb-2">
            <option>Animals</option>
            <option>Programming</option>
            <option>Countries</option>
        </select>

        <select name="difficulty" class="form-select w-25 mx-auto mb-2">
            <option>Easy</option>
            <option>Medium</option>
            <option>Hard</option>
        </select>

        <button class="btn btn-warning">Start New Game</button>
    </form>

    <form action="/new_game" method="POST" class="mt-3">
        <button class="btn btn-danger">Reset Game</button>
    </form>

</div>

</body>
</html>
