<!DOCTYPE html>
<html>
<head>
    <title>Hangman Pro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(120deg, #f6f7fb, #e9ecf5);
            font-family: Arial;
        }

        .game-box {
            max-width: 500px;
            margin: 60px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .word {
            font-size: 32px;
            letter-spacing: 6px;
            font-weight: bold;
        }

        .lives {
            color: #dc3545;
            font-size: 18px;
            margin-bottom: 15px;
        }

        input {
            text-align: center;
            font-size: 18px;
        }

        .history {
            font-size: 14px;
            color: gray;
        }
    </style>
</head>

<body>

<div class="game-box text-center">

    <h1 class="mb-3">🎮 Hangman Pro</h1>

    <div class="word mb-3">{{ word }}</div>

    <div class="lives">Lives: {{ lives }}</div>

    {% if history %}
        <div class="history mb-3">
            Guessed: {{ history }}
        </div>
    {% endif %}

    {% if won %}
        <div class="alert alert-success">🎉 You Won!</div>
    {% endif %}

    {% if lost %}
        <div class="alert alert-danger">😢 You Lost!</div>
    {% endif %}

    <form method="POST">
        <input name="letter" maxlength="1" class="form-control mb-2" required>
        <button class="btn btn-primary w-100">Guess</button>
    </form>

    <hr>

    <form method="POST">
        <select name="category" class="form-select mb-2">
            <option>Animals</option>
            <option>Programming</option>
            <option>Countries</option>
        </select>

        <select name="difficulty" class="form-select mb-2">
            <option>Easy</option>
            <option>Medium</option>
            <option>Hard</option>
        </select>

        <button class="btn btn-warning w-100">Start New Game</button>
    </form>

    <form action="/new_game" method="POST" class="mt-2">
        <button class="btn btn-danger w-100">Reset Game</button>
    </form>

</div>

</body>
</html>
